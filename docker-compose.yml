services:
  flight-arc:
    build:
      context: .
      args:
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    ports:
      - "3721:8080"
    volumes:
      # 大檔案統一掛載到 /data（與 Zeabur volume 路徑一致）
      - ./public/aviation_data.json:/data/aviation_data.json:ro
      - ./public/ship_data.json:/data/ship_data.json:ro
      - ./public/rail:/data/rail:ro
      - ./public/provincial_road.geojson:/data/provincial_road.geojson:ro
      - ./public/national_highway.geojson:/data/national_highway.geojson:ro
      - ./public/bus_stations_city.geojson:/data/bus_stations_city.geojson:ro
      - ./public/bus_stations_intercity.geojson:/data/bus_stations_intercity.geojson:ro
      - ./public/bike_stations.geojson:/data/bike_stations.geojson:ro
      - ./public/cycling_routes.geojson:/data/cycling_routes.geojson:ro
      - ./public/freeway_congestion.geojson:/data/freeway_congestion.geojson:ro
      - ./public/weather_stations.geojson:/data/weather_stations.geojson:ro
      - ./public/h3_demographics_res8.json:/data/h3_demographics_res8.json:ro
      - ./public/h3_population_res8.json:/data/h3_population_res8.json:ro
      - ./public/schools.geojson:/data/schools.geojson:ro
      - ./public/convenience_stores.geojson:/data/convenience_stores.geojson:ro
      - ./public/active_faults.geojson:/data/active_faults.geojson:ro
    restart: unless-stopped
