server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 大檔案從 persistent volume 讀取
    location ~ ^/(aviation_data\.json|ship_data\.json|provincial_road\.geojson|national_highway\.geojson|bus_stations_city\.geojson|bus_stations_intercity\.geojson) {
        root /data;
        expires 1d;
        add_header Cache-Control "public";
    }

    location /rail/ {
        root /data;
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
}
