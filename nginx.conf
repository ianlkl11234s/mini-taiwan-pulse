server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 大檔案從 persistent volume 讀取
    location ~ ^/(aviation_data\.json|ship_data\.json|provincial_road\.geojson|national_highway\.geojson|bus_stations_city\.geojson|bus_stations_intercity\.geojson|bike_stations\.geojson|cycling_routes\.geojson|freeway_congestion\.geojson|weather_stations\.geojson|temperature_grid\.json|schools\.geojson|convenience_stores\.geojson|active_faults\.geojson|h3_demographics_res8\.json|h3_population_res8\.json) {
        root /data;
        expires 1d;
        add_header Cache-Control "public";
    }

    location /rail/ {
        root /data;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Pulse API proxy（Zeabur 內部網路）
    location /api/ {
        proxy_pass http://mini-tw-pulse-api.zeabur.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        # 大回應（/ships/day 可能數 MB）需要足夠 buffer
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
}
